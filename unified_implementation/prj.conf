CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_PRINTK=y

# Feature toggles (comment/uncomment)
# Presets (pick one)
CONFIG_FEATURE_DOOM_PRESET_NRF5340DK_NRF5340_CPUAPP=y
# CONFIG_FEATURE_DOOM_PRESET_FRDM_MCXN947_MCXN947_CPU0=y
#
# OR choose features individually
# CONFIG_FEATURE_DOOM_SD=y
# CONFIG_FEATURE_DOOM_DISPLAY=y
# CONFIG_FEATURE_DOOM_AUDIO=y
# CONFIG_FEATURE_DOOM_BUTTONS=y
# CONFIG_FEATURE_DOOM_LEDS=y
#
# If CONFIG_FEATURE_DOOM_BLE is enabled on nRF5340 then bt_scan tuning may be
# required; keep NCS-only symbols in boards/nrf5340dk_nrf5340_cpuapp.conf.
# CONFIG_FEATURE_DOOM_BLE=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Common debug/metrics
CONFIG_CPU_LOAD=y
CONFIG_CPU_LOAD_LOG_PERIODICALLY=1000

# Common peripherals
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_DISPLAY=y

# WAD-in-flash path expects these on both targets
CONFIG_FLASH=y
CONFIG_XIP=y

CONFIG_MAIN_THREAD_PRIORITY=4
