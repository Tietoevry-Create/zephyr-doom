# Optional extra config for nRF Connect SDK (NCS) builds.
#
# Use with e.g.:
#   west build ... -DEXTRA_CONF_FILE=boards/nrf5340dk_nrf5340_cpuapp_ncs.conf

CONFIG_DK_LIBRARY=y

# NCS Bluetooth helper libraries used by `src/bluetooth_control.c`
CONFIG_BT_GATT_DM=y
CONFIG_BT_HOGP=y
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_UUID_CNT=1
CONFIG_BT_SCAN_NAME_CNT=19
