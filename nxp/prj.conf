CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_DISK_ACCESS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_EXFAT=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_STACK=y
CONFIG_SPI=y
CONFIG_GPIO=y

## Removed Nordic QSPI/XIP for portable core
# CONFIG_NRFX_QSPI is not set
CONFIG_XIP=y
# CONFIG_NORDIC_QSPI_NOR_XIP is not set
CONFIG_FLASH=y

CONFIG_MAIN_STACK_SIZE=4096

CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_RUNTIME_STATS_USE_TIMING_FUNCTIONS=y
CONFIG_TIMING_FUNCTIONS=y
CONFIG_CPU_LOAD=y
CONFIG_CPU_LOAD_LOG_PERIODICALLY=1000

CONFIG_DISPLAY=y
CONFIG_HEAP_MEM_POOL_SIZE=55000

CONFIG_SRAM_SIZE=416

## Bluetooth disabled in minimal build
# CONFIG_BT is not set

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# Audio via Zephyr I2S
# CONFIG_I2S=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_PRINTK=y
CONFIG_MAIN_THREAD_PRIORITY=4